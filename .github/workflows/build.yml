name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'

    - name: Create release keystore
      working-directory: android-app/app
      run: |
        keytool -genkeypair -v -keystore release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass gala2024 -keypass gala2024 -dname "CN=Gala Game, OU=Development, O=Gala, L=Beijing, ST=Beijing, C=CN"

    - name: Build with Gradle
      working-directory: android-app
      run: gradle assembleRelease --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v7
      with:
        name: gala-game-apk
        path: android-app/app/build/outputs/apk/release/*.apk

    - name: Create Release
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Gala Game v1.0.${{ github.run_number }}
        files: android-app/app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
