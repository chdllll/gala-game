name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    
    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: '17'
    
    - uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    
    - name: Create release keystore
      working-directory: android-app/app
      run: |
        keytool -genkeypair -v -keystore release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass gala2024 -keypass gala2024 -dname "CN=Gala Game, OU=Development, O=Gala, L=Beijing, ST=Beijing, C=CN"
    
    - name: Build APK
      working-directory: android-app
      run: ./gradlew assembleRelease --no-daemon
    
    - uses: actions/upload-artifact@v7
      with:
        name: apk
        path: android-app/app/build/outputs/apk/release/*.apk
